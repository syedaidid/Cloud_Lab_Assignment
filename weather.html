<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">← Back to Portfolio</a>
      <span class="navbar-brand">🌤️ Weather App</span>
    </div>
  </nav>

  <div class="container py-5" style="max-width: 500px;">
    <div class="card shadow">
      <div class="card-body text-center">
        <h4 class="mb-4">Check the Weather</h4>

        <div class="input-group mb-3">
          <input type="text" id="cityInput" class="form-control" placeholder="Enter city name...">
          <button class="btn btn-primary" onclick="getWeather()">Search</button>
        </div>

        <div id="weatherResult" class="mt-4" style="display:none;">
          <div id="weatherIcon" style="font-size: 4rem;"></div>
          <h3 id="cityName" class="mt-2"></h3>
          <h1 id="temperature" class="display-4 fw-bold text-primary"></h1>
          <p id="description" class="text-capitalize text-muted fs-5"></p>
          <div class="row mt-3">
            <div class="col-6">
              <div class="card bg-light">
                <div class="card-body py-2">
                  <small class="text-muted">Humidity</small>
                  <p id="humidity" class="mb-0 fw-bold"></p>
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="card bg-light">
                <div class="card-body py-2">
                  <small class="text-muted">Wind Speed</small>
                  <p id="wind" class="mb-0 fw-bold"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="errorMsg" class="alert alert-danger mt-3" style="display:none;">
          City not found. Please try again.
        </div>
      </div>
    </div>
  </div>

  <script src="js/weather.js"></script>
</body>
</html>
