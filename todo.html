<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">← Back to Portfolio</a>
      <span class="navbar-brand">📝 To-Do App</span>
    </div>
  </nav>

  <div class="container py-5" style="max-width: 600px;">
    <div class="card shadow">
      <div class="card-body">
        <h4 class="card-title mb-4">My Tasks</h4>

        <div class="input-group mb-3">
          <input type="text" id="taskInput" class="form-control" placeholder="Add a new task...">
          <button class="btn btn-primary" onclick="addTask()">Add</button>
        </div>

        <ul id="taskList" class="list-group"></ul>

        <div class="mt-3 d-flex justify-content-between">
          <small id="taskCount" class="text-muted">0 tasks</small>
          <button class="btn btn-sm btn-outline-danger" onclick="clearCompleted()">Clear completed</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/todo.js"></script>
</body>
</html>
